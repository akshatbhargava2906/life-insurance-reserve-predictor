# manifest.yml

applications:
  - name: health-reserve-predictor
    memory: 512M
    disk_quota: 512M
    instances: 1
    buildpacks:
      - python_buildpack
    command: gunicorn app.main:app -k uvicorn.workers.UvicornWorker --bind 0.0.0.0:$PORT
    env:
      MODEL_PATH: reserve_model.joblib
    routes:
      - route: health-reserve-predictor.cfapps.eu10-004.hana.ondemand.com